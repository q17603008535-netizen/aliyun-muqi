<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Callback</title>
</head>
<body>
  <script>
    // Parse the OAuth code from URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    
    if (code) {
      // Send message to the parent window (Sveltia CMS)
      if (window.opener) {
        window.opener.postMessage({
          type: 'authorization_response',
          payload: {
            provider: 'github',
            token: code
          }
        }, window.location.origin);
        window.close();
      }
    } else {
      document.body.innerHTML = '<p>OAuth callback failed. Please close this window and try again.</p>';
    }
  </script>
</body>
</html>
