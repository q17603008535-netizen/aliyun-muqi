backend:
  name: github
  repo: q17603008535-netizen/aliyun-muqi
  branch: main
  # 使用 GitHub Token 登录（无需 OAuth）

# 启用本地开发模式（可选）
# local_backend: true

media_folder: public/images
public_folder: /images

local_backend: false

collections:
  - name: settings
    label: 網站設置
    folder: src/content/settings
    create: false
    slug: "config"
    fields:
      - { name: logo, label: Logo圖標, widget: image, hint: "建議尺寸 100x100 方形PNG" }
      - { name: brand_name, label: 品牌名稱, widget: string, default: "沐祁珠寶" }
      - { name: instagram, label: TikTok, widget: string, hint: "輸入 TikTok 主頁連結" }
      - { name: youtube, label: YouTube, widget: string, hint: "輸入 YouTube 頻道連結" }
      - { name: facebook, label: Facebook, widget: string, hint: "輸入 Facebook 專頁連結" }

  - name: products
    label: 產品管理
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    fields:
      - { name: name, label: 產品名稱, widget: string }
      - { name: weight, label: 重量, widget: string }
      - { name: price, label: 價格, widget: string }
      - { name: description, label: 描述, widget: text }
      - { name: image, label: 產品圖片, widget: image }
      - { name: featured, label: 顯示首頁, widget: boolean, default: false }

  - name: products_config
    label: 產品字段設置
    folder: src/content/products_config
    create: false
    slug: "config"
    fields:
      - { name: name_label, label: 產品名稱標籤, widget: string, default: "產品名稱" }
      - { name: name_visible, label: 顯示產品名稱, widget: boolean, default: true }
      - { name: weight_label, label: 重量標籤, widget: string, default: "重量" }
      - { name: weight_visible, label: 顯示重量, widget: boolean, default: true }
      - { name: price_label, label: 價格標籤, widget: string, default: "價格" }
      - { name: price_visible, label: 顯示價格, widget: boolean, default: true }
      - { name: description_label, label: 描述標籤, widget: string, default: "描述" }
      - { name: description_visible, label: 顯示描述, widget: boolean, default: true }

  - name: hero
    label: 首頁Banner
    folder: src/content/hero
    create: false
    slug: "config"
    fields:
      - { name: background_image, label: 電腦端背景圖片, widget: image, hint: "建議比例 16:9" }
      - { name: mobile_background_image, label: 手機端背景圖片, widget: image, hint: "建議比例 3:4" }
      - name: title_lines
        label: 主標題
        widget: list
        fields:
          - { name: text, label: 標題文字, widget: string }
      - name: title_lines_mobile
        label: 主標題(手機端)
        widget: list
        fields:
          - { name: text, label: 標題文字, widget: string }
      - name: subtitle_lines
        label: 副標題
        widget: list
        fields:
          - { name: text, label: 副標題文字, widget: string }
      - name: subtitle_lines_mobile
        label: 副標題(手機端)
        widget: list
        fields:
          - { name: text, label: 副標題文字, widget: string }
      - { name: cta_text, label: 按鈕文字, widget: string, default: "立即咨詢" }
      - { name: badge_text, label: 頂部標籤文字, widget: string, default: "缅甸翡翠定制专家" }
      - { name: youtube_url, label: YouTube影片連結, widget: string, hint: "例如: https://www.youtube.com/embed/xxxxx", required: false }

  - name: about
    label: 關於我們
    folder: src/content/about
    create: false
    slug: "config"
    fields:
      - { name: experience_image, label: 經驗圖片, widget: image, hint: "建議比例 1:1 方形" }
      - { name: experience_text, label: 經驗文字, widget: string, default: "10 年+" }
      - { name: title, label: 標題, widget: string, default: "專業翡翠原石買手" }
      - { name: description, label: 描述文字, widget: string, default: "有自己獨特的買原石邏輯，保證客戶買到的原石都能做貨" }
      - { name: feature_1_title, label: 特色1標題, widget: string, default: "14年雕刻學徒出身" }
      - { name: feature_1_description, label: 特色1描述, widget: string, default: "2014年開始做雕刻學徒，潛心5年，2019年開始轉做直播，後來開始自己買石頭" }
      - { name: feature_1_icon, label: 特色1圖標, widget: string, default: "盾牌" }
      - { name: feature_2_title, label: 特色2標題, widget: string, default: "忠實客戶" }
      - { name: feature_2_description, label: 特色2描述, widget: string, default: "跟隨3年以上的客戶 5人以上，口碑良好" }
      - { name: feature_2_icon, label: 特色2圖標, widget: string, default: "人群" }
      - { name: feature_3_title, label: 特色3標題, widget: string, default: "經營理念" }
      - { name: feature_3_description, label: 特色3描述, widget: string, default: "不割韭菜，真實做生意" }
      - { name: feature_3_icon, label: 特色3圖標, widget: string, default: "勾選" }

  - name: trust
    label: 信任保證
    folder: src/content/trust
    create: false
    slug: "config"
    fields:
      - { name: title, label: 標題, widget: string, default: "信任保證" }
      - { name: subtitle, label: 副標題, widget: string, default: "選擇我們的信心保障" }
      - name: items
        label: 保證項目
        widget: list
        fields:
          - { name: icon, label: 圖標, widget: select, options: ["盾牌", "貨幣", "證書", "循環", "商務", "切割", "礦石", "眼睛", "星星", "握手"], default: "盾牌" }
          - { name: title, label: 標題, widget: string }
          - { name: description, label: 描述, widget: text }

  - name: why_us
    label: 為什麼選擇我們
    folder: src/content/why_us
    create: false
    slug: "config"
    fields:
      - { name: title, label: 標題, widget: string, default: "為什麼選擇我們" }
      - { name: subtitle, label: 副標題, widget: string, default: "核心優勢，讓您放心選購" }
      - name: items
        label: 優勢項目
        widget: list
        fields:
          - { name: icon, label: 圖標, widget: select, options: ["價格優勢", "品質保證", "專業可靠", "客戶口碑", "快速配送", "安全交易"], default: "價格優勢" }
          - { name: title, label: 標題, widget: string }
          - { name: description, label: 描述, widget: text }

  - name: contact
    label: 聯繫方式
    folder: src/content/contact
    create: true
    slug: "{{slug}}"
    fields:
      - { name: type, label: 類型, widget: select, options: [微信, LINE, Email, 電話, 地址], default: 微信 }
      - { name: value, label: 帳號/地址, widget: string }
      - { name: label, label: 顯示名稱, widget: string, default: 請添加 }
      - { name: icon, label: 圖標, widget: string, hint: "填寫圖標名稱，如: wechat, line, email, phone, address" }
      - { name: visible, label: 顯示在前端, widget: boolean, default: true }
      - { name: order, label: 排序順序, widget: number, default: 1 }

  - name: testimonials
    label: 客戶評價
    folder: src/content/testimonials
    create: true
    slug: "{{slug}}"
    fields:
      - { name: name, label: 客戶姓名, widget: string }
      - { name: location, label: 地區, widget: string }
      - { name: content, label: 評價內容, widget: text }
      - { name: rating, label: 評分, widget: number, min: 1, max: 5, default: 5 }

  - name: testimonials_config
    label: 客戶評價設置
    folder: src/content/testimonials_config
    create: false
    slug: "config"
    fields:
      - { name: title, label: 標題, widget: string, default: "客戶見證" }
      - { name: subtitle, label: 副標題, widget: string, default: "感謝客戶的信任與支持" }

  - name: tracking_codes
    label: 追蹤代碼管理
    folder: src/content/tracking_codes
    create: false
    slug: "config"
    fields:
      - { name: head_scripts, label: "Head 代碼（<head>）", widget: text, default: "", required: false, hint: "放置在<head>标签内，例如：Google Analytics、Google Ads 轉化追蹤等代碼" }
      - { name: body_scripts, label: "Body 代碼（<body>）", widget: text, default: "", required: false, hint: "放置在<body>标签内，例如：Pixel 初始化代碼等" }
      - { name: foot_scripts, label: "底部代碼（</body> 前）", widget: text, default: "", required: false, hint: "放置在</body>标签前，例如：客服聊天工具、推薦引擎等代碼" }
